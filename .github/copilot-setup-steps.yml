steps:
  - name: Setup pnpm
    uses: pnpm/action-setup@v4
    with:
      version: 9

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: 22
      cache: "pnpm"

  - name: Install agent-browser CLI
    # Required for the test-web skill used by AI coding agents to test UI changes in the browser
    run: npm install -g agent-browser

  - name: Install dependencies
    run: pnpm install
